name: 收盘复盘推送飞书

on:
  schedule:
    # UTC 9:00-11:30 对应北京时间 17:00-19:30，每30分钟检查一次
    # 只有数据发布了才会真正推送，没发布会自动跳过等下次
    - cron: "0,30 9-11 * * 1-5"
  workflow_dispatch:
    inputs:
      test_date:
        description: "测试用的历史交易日（格式20260717），留空则按正常逻辑用今天"
        required: false
        default: ""

permissions:
  contents: write

# 防止"外部定时器"和"GitHub自带定时器"凑巧同时触发，导致同一天的复盘被推送两次
concurrency:
  group: lhb-push
  cancel-in-progress: false

jobs:
  push-lhb:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装中文字体（图表用）
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: 安装依赖
        run: pip install akshare requests matplotlib reportlab

      - name: 运行复盘推送脚本
        env:
          FEISHU_WEBHOOK_LHB: ${{ secrets.FEISHU_WEBHOOK_LHB }}
          TEST_DATE: ${{ github.event.inputs.test_date }}
        run: python lhb_push.py

      - name: 保存今日已推送记录和PDF报告
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add lhb_sent.json reports/ || true
          git diff --cached --quiet || git commit -m "更新复盘推送记录与PDF报告 [skip ci]"
          git push || true
