name: 收盘复盘推送飞书

on:
  schedule:
    # UTC 9:00-11:30 对应北京时间 17:00-19:30，每30分钟检查一次
    # 只有数据发布了才会真正推送，没发布会自动跳过等下次
    - cron: "0,30 9-11 * * 1-5"
  workflow_dispatch: {}  # 允许手动点一下立即运行，方便测试

permissions:
  contents: write

jobs:
  push-lhb:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install akshare requests

      - name: 运行复盘推送脚本
        env:
          FEISHU_WEBHOOK_LHB: ${{ secrets.FEISHU_WEBHOOK_LHB }}
        run: python lhb_push.py

      - name: 保存今日已推送记录
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add lhb_sent.json || true
          git diff --cached --quiet || git commit -m "更新复盘推送记录 [skip ci]"
          git push || true
